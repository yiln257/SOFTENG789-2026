version: '3.8'

services:
  # 1. 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules # 防止本地的 node_modules 覆盖容器内的
    environment:
      - WATCHPACK_POLLING=true # 解决 WSL2 下热更新失效的问题

  # 2. 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/test_system
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongo
      - redis

  # 3. MongoDB 数据库
  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # 4. Redis 缓存与锁
  redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data: