name: Deploy to Catalyst Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: catalyst-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CATALYST_HOST: ${{ secrets.CATALYST_HOST }}
      CATALYST_USER: ${{ secrets.CATALYST_USER }}
      CATALYST_PORT: ${{ secrets.CATALYST_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.CATALYST_DEPLOY_PATH || '/opt/softeng789' }}
      RELEASE_SHA: ${{ github.sha }}
      CATALYST_SSH_KEY: ${{ secrets.CATALYST_SSH_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          test -n "$CATALYST_HOST" || { echo "Missing CATALYST_HOST secret"; exit 1; }
          test -n "$CATALYST_USER" || { echo "Missing CATALYST_USER secret"; exit 1; }
          test -n "$CATALYST_SSH_KEY" || { echo "Missing CATALYST_SSH_KEY secret"; exit 1; }

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$CATALYST_SSH_KEY" > ~/.ssh/catalyst_deploy_key
          chmod 600 ~/.ssh/catalyst_deploy_key
          ssh-keyscan -p "$CATALYST_PORT" -H "$CATALYST_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        run: |
          ssh -p "$CATALYST_PORT" -i ~/.ssh/catalyst_deploy_key "$CATALYST_USER@$CATALYST_HOST" \
            "mkdir -p '$DEPLOY_PATH/releases/$RELEASE_SHA' '$DEPLOY_PATH/shared'"

          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/dist' \
            --exclude='backend/node_modules' \
            --exclude='mongo_data' \
            --exclude='redis_data' \
            -czf - . | ssh -p "$CATALYST_PORT" -i ~/.ssh/catalyst_deploy_key "$CATALYST_USER@$CATALYST_HOST" \
              "tar -xzf - -C '$DEPLOY_PATH/releases/$RELEASE_SHA'"

      - name: Restart services
        run: |
          ssh -p "$CATALYST_PORT" -i ~/.ssh/catalyst_deploy_key "$CATALYST_USER@$CATALYST_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' RELEASE_SHA='$RELEASE_SHA' bash '$DEPLOY_PATH/releases/$RELEASE_SHA/scripts/deploy-on-server.sh'"
